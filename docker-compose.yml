
services:
  db:
    image: pgvector/pgvector:pg16
    container_name: be_an_ai_engineer_db
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: be_an_ai_engineer
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d be_an_ai_engineer"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
